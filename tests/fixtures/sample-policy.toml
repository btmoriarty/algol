# Example .algol/policy.toml (starter, illustrative)
#
# This is the core product: versioned, path-scoped review standards, compiled
# by skills/algol/tools/compile_policy.py into review instructions, scanner
# rules, routing criteria, and a catalog. Standards are open-ended; the axes
# below are examples, not a fixed spine. A change to this file is a dated,
# reviewable diff of how the project reviews.

[meta]
version = "0"        # policy schema version
project = "example"

# Undo-cost classes. A change touching any path in a class escalates to the
# named engine even without another flag. Model: reversibility routing.
[[undo_cost]]
class = "irreversible"
paths = ["db/migrations/**", "api/public/**", "billing/**"]
escalate_to = "gauntlet"

# Declared standards, scoped by path. Each names the axis and the engine that
# covers it. seclint and brevlint are Algol-native deterministic collectors;
# policy-review is the model pass; testing routes out to a composed discipline.
[[standard]]
axis = "security"
paths = ["**/*.py", "**/*.ts"]
engine = "seclint"

[[standard]]
axis = "brevity"
paths = ["**/*.md", "docs/**"]
engine = "brevlint"

[[standard]]
axis = "policy"
paths = ["**"]
engine = "policy-review"

[[standard]]
axis = "testing"
paths = ["**"]
engine = "evidence-locked-uat"   # routed out, not rebuilt

# The router recommends; it never auto-launches. `default` is the engine for a
# change that matches no standard.
[router]
default = "skip"
